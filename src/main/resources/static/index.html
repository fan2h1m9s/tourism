<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能旅游助手</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #eef3ff 0%, #f7fbff 100%); margin: 0; padding: 0; }
        #app-shell { width: min(1100px, 96vw); height: min(92vh, 920px); margin: 4vh auto; background-color: #ffffff; border-radius: 14px; box-shadow: 0 8px 28px rgba(0,0,0,0.12); overflow: hidden; display: flex; }

        #session-panel { width: 300px; border-right: 1px solid #e6e9ef; display: flex; flex-direction: column; background: #f8faff; }
        #session-header { padding: 14px 14px 10px; border-bottom: 1px solid #e6e9ef; }
        #session-title { font-size: 1.05rem; font-weight: 700; color: #1f2d3d; margin: 0 0 10px; }
        #new-session-btn { width: 100%; border: none; background: #2362ff; color: #fff; padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 0.95rem; }
        #new-session-btn:hover { background: #124be0; }
        #session-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .session-item { border: 1px solid #dce4f3; border-radius: 10px; background: #fff; padding: 10px; cursor: pointer; }
        .session-item:hover { border-color: #92b2ff; }
        .session-item.active { border-color: #2362ff; background: #edf3ff; }
        .session-item-title { font-size: 0.92rem; font-weight: 600; color: #243447; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-item-time { font-size: 0.76rem; color: #6f7f92; }

        #chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #header { background-color: #2362ff; color: white; padding: 15px 20px; text-align: center; font-size: 1.1em; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95em; word-wrap: break-word; }
        .user-message { align-self: flex-end; background-color: #2362ff; color: white; border-bottom-right-radius: 4px; }
        .ai-message { align-self: flex-start; background-color: #f1f3f4; color: #333; border-bottom-left-radius: 4px; }
        #input-container { padding: 15px 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; background-color: #fff; }
        #user-input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 1em; transition: border-color 0.3s; }
        #user-input:focus { border-color: #2362ff; }
        #send-btn { background-color: #2362ff; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-size: 1em; font-weight: bold; transition: background-color 0.3s; }
        #send-btn:hover { background-color: #124be0; }
        #send-btn:disabled { background-color: #a0c4ff; cursor: not-allowed; }

        /* Markdown 渲染样式 */
        .ai-message { white-space: normal; }
        .ai-message h1, .ai-message h2, .ai-message h3, .ai-message h4 {
            margin: 8px 0;
            line-height: 1.35;
        }
        .ai-message p { margin: 6px 0; }
        .ai-message ul, .ai-message ol { margin: 6px 0 6px 18px; }
        .ai-message hr { border: none; border-top: 1px solid #d8dce3; margin: 10px 0; }
        .ai-message table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.9em;
            display: block;
            overflow-x: auto;
        }
        .ai-message th, .ai-message td {
            border: 1px solid #d8dce3;
            padding: 6px 8px;
            text-align: left;
            white-space: nowrap;
        }
        .ai-message th { background-color: #f7f8fa; }
        .ai-message code {
            background: #eef2f7;
            border-radius: 4px;
            padding: 1px 4px;
        }

        .empty-tip {
            text-align: center;
            color: #7c8b9c;
            font-size: 0.92rem;
            margin-top: 16px;
        }

        @media (max-width: 900px) {
            #app-shell { width: 100vw; height: 100vh; margin: 0; border-radius: 0; }
            #session-panel { width: 34%; min-width: 140px; }
        }
    </style>
</head>
<body>

<div id="app-shell">
    <aside id="session-panel">
        <div id="session-header">
            <p id="session-title">会话列表</p>
            <button id="new-session-btn" onclick="createNewSession()">+ 新建会话</button>
        </div>
        <div id="session-list"></div>
    </aside>

    <div id="chat-container">
        <div id="header">🏔️ AI 智能旅游助手 🏕️</div>
        <div id="messages"></div>
        <div id="input-container">
            <input type="text" id="user-input" placeholder="输入你要去哪里或者你的需求... (支持多行程)" onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">发 送</button>
        </div>
    </div>
</div>

<script src="/lib/marked.min.js"></script>
<script src="/lib/purify.min.js"></script>
<script>
    const userId = "demo-user";
    let currentSessionId = "";
    let sessions = [];

    if (typeof marked !== 'undefined') {
        marked.setOptions({
            breaks: true,
            gfm: true
        });
    }

    function renderMarkdown(targetDiv, markdownText) {
        if (typeof marked === 'undefined') {
            targetDiv.innerText = markdownText || "";
            return;
        }
        const html = marked.parse(markdownText || "");
        targetDiv.innerHTML = typeof DOMPurify !== 'undefined'
            ? DOMPurify.sanitize(html)
            : html;
    }

    function formatTime(timeStr) {
        if (!timeStr) return "";
        const d = new Date(timeStr);
        if (Number.isNaN(d.getTime())) return timeStr;
        return d.toLocaleString('zh-CN', { hour12: false });
    }

    function getMessagesContainer() {
        return document.getElementById('messages');
    }

    function clearMessages() {
        getMessagesContainer().innerHTML = '';
    }

    function showWelcomeMessage() {
        addMessage('你好！我是你的智能旅游规划助手，你有什么旅行计划或想知道哪些城市的景点推荐呢？', 'ai-message');
    }

    function renderSessionList() {
        const container = document.getElementById('session-list');
        container.innerHTML = '';

        if (!sessions.length) {
            const tip = document.createElement('div');
            tip.className = 'empty-tip';
            tip.innerText = '暂无历史会话';
            container.appendChild(tip);
            return;
        }

        sessions.forEach((s) => {
            const item = document.createElement('div');
            item.className = 'session-item' + (s.sessionId === currentSessionId ? ' active' : '');
            item.onclick = () => switchSession(s.sessionId);

            const title = document.createElement('div');
            title.className = 'session-item-title';
            title.innerText = s.title || '(未命名会话)';

            const time = document.createElement('div');
            time.className = 'session-item-time';
            time.innerText = formatTime(s.lastMessageTime);

            item.appendChild(title);
            item.appendChild(time);
            container.appendChild(item);
        });
    }

    async function loadSessions() {
        const resp = await fetch('/chat/sessions?userId=' + encodeURIComponent(userId) + '&limit=100');
        if (!resp.ok) {
            throw new Error('会话列表加载失败');
        }
        sessions = await resp.json();
        renderSessionList();
    }

    async function loadHistory(sessionId) {
        const resp = await fetch('/chat/history?sessionId=' + encodeURIComponent(sessionId) + '&limit=200');
        if (!resp.ok) {
            throw new Error('历史消息加载失败');
        }
        return await resp.json();
    }

    async function switchSession(sessionId) {
        currentSessionId = sessionId;
        renderSessionList();
        clearMessages();

        const history = await loadHistory(sessionId);
        if (!history.length) {
            showWelcomeMessage();
            return;
        }

        history.forEach((m) => {
            addMessage(m.content || '', m.role === 'assistant' ? 'ai-message' : 'user-message');
        });
    }

    async function createNewSession() {
        currentSessionId = '';
        renderSessionList();
        clearMessages();
        showWelcomeMessage();
        document.getElementById('user-input').focus();
    }
    
    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const text = inputField.value.trim();
        if (!text) return;
        
        addMessage(text, 'user-message');
        inputField.value = '';
        
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        btn.innerText = '思考中...';

        // 占位符准备接收打字机内容
        const aiMessageDiv = document.createElement('div');
        aiMessageDiv.className = 'message ai-message';
        document.getElementById('messages').appendChild(aiMessageDiv);
        scrollToBottom();

        try {
            // 调用后端的流式接口
            const response = await fetch('/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: currentSessionId, userId: userId, message: text })
            });

            if (!response.ok) {
                throw new Error("网络响应异常");
            }

            const newSessionId = response.headers.get('X-Session-Id');
            if (newSessionId) {
                currentSessionId = newSessionId;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let aiText = "";

            // 读取流式数据（打字机效果）
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                // 解析返回的数据块 SSE中的 "data:"
                const chunk = decoder.decode(value, { stream: true });
                // 使用正则表达式匹配 SSE 的 data 块
                const dataLines = chunk.split('\n');
                for(let line of dataLines) {
                    if (line.startsWith('data:')) {
                        const content = line.substring(5).replace(/^ /, ''); // 去掉 "data:" 和紧随的空格
                        aiText += content;
                        renderMarkdown(aiMessageDiv, aiText);
                        scrollToBottom();
                    }
                }
            }
            await loadSessions();
            if (!currentSessionId && sessions.length) {
                currentSessionId = sessions[0].sessionId;
            }
            renderSessionList();
        } catch (error) {
            aiMessageDiv.innerText = "抱歉，系统或网络出现异常，请稍后再试。[" + error.message + "]";
        } finally {
            btn.disabled = false;
            btn.innerText = '发 送';
            scrollToBottom();
        }
    }

    function addMessage(text, className) {
        const div = document.createElement('div');
        div.className = 'message ' + className;
        if (className === 'ai-message') {
            renderMarkdown(div, text);
        } else {
            div.innerText = text;
        }
        document.getElementById('messages').appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        const msgs = document.getElementById('messages');
        msgs.scrollTop = msgs.scrollHeight;
    }

    // 启动时先加载会话与默认内容
    (async function init() {
        try {
            await loadSessions();
            if (sessions.length) {
                await switchSession(sessions[0].sessionId);
            } else {
                showWelcomeMessage();
            }
        } catch (e) {
            showWelcomeMessage();
            addMessage('会话列表加载失败，请稍后重试。', 'ai-message');
        }
    })();
</script>
</body>
</html>
